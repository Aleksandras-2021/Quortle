<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quortle</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="./resources/favicon-32x32.png" type="image/png">
<link rel="icon" href="./resources/favicon-16x16.png" type="image/png">
</head>
<body>
  <div id="navbar"></div>
  
  <h1>Quortle</h1>
  
<form id="auth-form">
  <input type="text" id="username" placeholder="Username" />
  <input type="password" id="password" placeholder="Password" />

  <div class="button-group">
    <button type="button" onclick="register()">Register</button>
    <button type="button" onclick="login()">Login</button>
  </div>
</form>
    
    <div id="message"></div>

  <div class="footer">
    <p>Created by Aleksandras. Inspired by Wordle.  <span class="year"></span> </p>
  </div>

  <script src="script.js"></script>
</body>


</html>
